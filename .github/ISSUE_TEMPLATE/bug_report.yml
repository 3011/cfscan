name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report vulnerabilities here. Use the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.0.0 or image digest
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options: [Docker Compose, Kubernetes, binaries, source, other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs and configuration
      description: Remove tokens, passwords, cookies, private addresses, and production data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed credentials and sensitive data.
          required: true
