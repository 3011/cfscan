name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: '11.12.0'
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: corepack enable
      - run: python3 scripts/check_docs.py
      - run: go vet ./... && go test -race ./...
      - working-directory: web
        run: pnpm install --frozen-lockfile && pnpm check

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build archive
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          archive_dir="release/cfscan-linux-${GOARCH}"
          archive_file="release/cfscan-linux-${GOARCH}.tar.gz"
          mkdir -p "$archive_dir"
          go build -trimpath -ldflags='-s -w' -o "$archive_dir/cfscan-server" ./cmd/server
          go build -trimpath -ldflags='-s -w' -o "$archive_dir/cfscan-agent" ./cmd/agent
          cp LICENSE NOTICE CHANGELOG.md "$archive_dir/"
          tar -C release -czf "$archive_file" "cfscan-linux-${GOARCH}"
          sha256sum "$archive_file" > "${archive_file}.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goarch }}
          path: |
            release/*.tar.gz
            release/*.sha256
          if-no-files-found: error

  images:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - image: cfscan-server
            context: .
            file: Dockerfile.server
          - image: cfscan-agent
            context: .
            file: Dockerfile.agent
          - image: cfscan-web
            context: web
            file: web/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  github-release:
    needs: [binaries, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: release
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "CF Scanner ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
