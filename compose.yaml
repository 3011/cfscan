services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cfscan
      POSTGRES_USER: cfscan
      POSTGRES_PASSWORD: cfscan
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfscan -d cfscan"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      CFSCAN_HTTP_ADDR: :8080
      CFSCAN_DATABASE_URL: postgres://cfscan:cfscan@postgres:5432/cfscan?sslmode=disable
      CFSCAN_AGENT_TOKEN: ${CFSCAN_AGENT_TOKEN:-local-agent-token}
      CFSCAN_BOOTSTRAP_ADMIN_USERNAME: ${CFSCAN_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CFSCAN_BOOTSTRAP_ADMIN_PASSWORD: ${CFSCAN_BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}
      CFSCAN_SESSION_TTL: ${CFSCAN_SESSION_TTL:-24h}
      CFSCAN_COOKIE_SECURE: "false"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ./web
    ports:
      - "18081:80"
    depends_on:
      server:
        condition: service_healthy

  local-agent:
    profiles: ["agent"]
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      CFSCAN_CENTER_URL: http://server:8080
      CFSCAN_AGENT_TOKEN: ${CFSCAN_AGENT_TOKEN:-local-agent-token}
      CFSCAN_AGENT_NAME: ${CFSCAN_AGENT_NAME:-docker-local-agent}
      CFSCAN_AGENT_REGION: ${CFSCAN_AGENT_REGION:-local}
      CFSCAN_AGENT_CONTINENT: ${CFSCAN_AGENT_CONTINENT:-local}
      CFSCAN_AGENT_CONCURRENCY: ${CFSCAN_AGENT_CONCURRENCY:-32}
      CFSCAN_AGENT_HEARTBEAT_INTERVAL: ${CFSCAN_AGENT_HEARTBEAT_INTERVAL:-15s}
      CFSCAN_AGENT_POLL_INTERVAL: ${CFSCAN_AGENT_POLL_INTERVAL:-5s}
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
