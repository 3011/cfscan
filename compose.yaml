services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cfscan
      POSTGRES_USER: cfscan
      POSTGRES_PASSWORD: cfscan
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfscan -d cfscan"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      CFSCAN_HTTP_ADDR: :8080
      CFSCAN_DATABASE_URL: postgres://cfscan:cfscan@postgres:5432/cfscan?sslmode=disable
      CFSCAN_AGENT_TOKEN: ${CFSCAN_AGENT_TOKEN:-}
      CFSCAN_PUBLIC_WEB_URL: http://localhost:18081
      CFSCAN_PUBLIC_AGENT_URL: http://localhost:18080
      CFSCAN_AGENT_IMAGE: ghcr.io/3011/cfscan-agent:v1.1.0
      CFSCAN_AGENT_VERSION: v1.1.0
      CFSCAN_AGENT_ENROLLMENT_TTL: ${CFSCAN_AGENT_ENROLLMENT_TTL:-10m}
      CFSCAN_AGENT_ENROLLMENT_POLL_INTERVAL: ${CFSCAN_AGENT_ENROLLMENT_POLL_INTERVAL:-3s}
      CFSCAN_BOOTSTRAP_ADMIN_USERNAME: ${CFSCAN_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CFSCAN_BOOTSTRAP_ADMIN_PASSWORD: ${CFSCAN_BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}
      CFSCAN_SESSION_TTL: ${CFSCAN_SESSION_TTL:-24h}
      CFSCAN_COOKIE_SECURE: "false"
    ports:
      - "18080:8080"
    networks:
      default:
        aliases:
          - cfscan-server
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ./web
    ports:
      - "18081:80"
    depends_on:
      server:
        condition: service_healthy

  local-agent:
    profiles: ["agent"]
    build:
      context: .
      dockerfile: Dockerfile.agent
    command:
      - connect
      - --server
      - http://server:8080
      - --allow-insecure-http
      - --identity-file
      - /var/lib/cfscan-agent/identity.json
      - --name
      - ${CFSCAN_AGENT_NAME:-docker-local-agent}
      - --concurrency
      - ${CFSCAN_AGENT_CONCURRENCY:-32}
    environment:
      CFSCAN_AGENT_IDENTITY_FILE: /var/lib/cfscan-agent/identity.json
      CFSCAN_AGENT_HEARTBEAT_INTERVAL: ${CFSCAN_AGENT_HEARTBEAT_INTERVAL:-15s}
      CFSCAN_AGENT_POLL_INTERVAL: ${CFSCAN_AGENT_POLL_INTERVAL:-5s}
    volumes:
      - agent-data:/var/lib/cfscan-agent
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
  agent-data:
