server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Management enrollment routes may contain a short-lived pairing UUID.
    location ^~ /api/v1/agent-enrollments {
        access_log off;
        proxy_pass http://cfscan-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://cfscan-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://cfscan-server:8080/healthz;
    }

    # Pairing URLs contain a short-lived secret and must not be written to access logs.
    location ^~ /agents/pair/ {
        access_log off;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
